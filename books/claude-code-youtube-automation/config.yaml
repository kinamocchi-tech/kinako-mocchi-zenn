title: "Claude Codeで作るYouTubeチャンネル完全自動化"
summary: |
  AI（Claude Code）を活用して、YouTubeチャンネルの制作パイプラインをゼロから自動化するノウハウを体系化した書籍です。
  リサーチ→台本→音声→画像→動画→公開の全工程を、実際に稼働しているチャンネル「きなこもっちーのテック深掘り」の事例をベースに解説します。
  Claude Code Skills、Agent Teams、VOICEVOX、Gemini API、Remotion、YouTube API を統合した制作パイプラインの設計と実装を学べます。
