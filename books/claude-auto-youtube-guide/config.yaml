title: "Claudeだけで動くYouTubeチャンネル ── 非エンジニアのための完全自動化バイブル"
summary: |
  「自分でYouTubeチャンネルを作りたいけど、技術的なことは苦手…」そんなあなたに。
  実際に稼働しているAI自動制作チャンネル「きなこもっちーのテック深掘り」の構築ノウハウを、
  非エンジニアでも再現できるよう丁寧に解説します。
  あなたが唯一やることは「Claudeでディープリサーチをする」だけ。
  台本生成・音声合成・動画制作・YouTubeアップロードはすべてClaudeのクラウドが自動実行します。
  GitHubとは何か・Scheduled Tasksとは何か・CLAUDE.mdの書き方など、
  ゼロから理解できる基礎知識も丁寧に解説。
